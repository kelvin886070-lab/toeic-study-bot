<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TOEIC Daily</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #000; color: #fff; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
.app { max-width: 600px; margin: 0 auto; padding: 32px 20px 60px; }

/* Header */
.header { border-bottom: 1px solid #1a1a1a; padding-bottom: 24px; margin-bottom: 28px; }
.brand { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #555; margin-bottom: 16px; }
.date-line { font-size: 13px; color: #555; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
.target-line { font-size: 13px; color: #777; margin-bottom: 12px; }
.target-line span { color: #fff; }
.progress-container { margin-top: 4px; }
.progress-label { font-size: 11px; color: #444; margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar { height: 1px; background: #1a1a1a; width: 100%; }
.progress-fill { height: 100%; background: #fff; transition: width 0.4s ease; }

/* Quote */
.quote-block { padding: 24px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 28px; }
.quote-text { font-size: 14px; line-height: 1.7; color: #888; font-style: italic; margin-bottom: 6px; }
.quote-author { font-size: 11px; color: #444; letter-spacing: 0.05em; }

/* Tasks */
.tasks-header { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #444; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.tasks-done { font-weight: 400; color: #333; }
.task-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid #111; cursor: pointer; user-select: none; transition: opacity 0.2s; }
.task-item:last-child { border-bottom: none; }
.task-item.done { opacity: 0.35; }
.checkbox { width: 16px; height: 16px; border: 1px solid #333; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.checkbox.checked { background: #fff; border-color: #fff; }
.check-mark { width: 8px; height: 5px; border-left: 1.5px solid #000; border-bottom: 1.5px solid #000; transform: rotate(-45deg) translate(1px, -1px); display: none; }
.checkbox.checked .check-mark { display: block; }
.task-content { flex: 1; }
.task-text { font-size: 14px; color: #ccc; line-height: 1.5; }
.task-item.done .task-text { text-decoration: line-through; color: #333; }
.task-time { font-size: 11px; color: #444; margin-top: 3px; font-variant-numeric: tabular-nums; }

/* Carryover */
.carryover-header { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #555; margin-bottom: 14px; margin-top: 28px; }
.carryover-note { font-size: 11px; color: #333; margin-bottom: 16px; }

/* All done */
.all-done { padding: 40px 0; text-align: center; }
.all-done-title { font-size: 16px; color: #fff; margin-bottom: 8px; font-weight: 500; }
.all-done-sub { font-size: 13px; color: #444; }

/* No schedule */
.no-schedule { padding: 40px 0; text-align: center; }
.no-schedule p { font-size: 14px; color: #444; line-height: 1.7; }

/* Notes */
.notes-section { margin-top: 40px; border-top: 1px solid #1a1a1a; padding-top: 24px; }
.notes-label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #333; margin-bottom: 12px; }
.notes-area { width: 100%; background: transparent; border: none; color: #555; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 80px; line-height: 1.7; }
.notes-area::placeholder { color: #2a2a2a; }
</style>
</head>
<body>
<div class="app" id="root">
  <div style="color:#333;padding:40px 0;text-align:center;font-size:13px;">Loading...</div>
</div>
<script>
const EXAM_DATE = new Date('2026-05-31');
const TOTAL_DAYS = 11;

const QUOTES = [
  {text:"The secret of getting ahead is getting started.", by:"Mark Twain"},
  {text:"It does not matter how slowly you go as long as you do not stop.", by:"Confucius"},
  {text:"Success is the sum of small efforts, repeated day in and day out.", by:"Robert Collier"},
  {text:"You don't have to be great to start, but you have to start to be great.", by:"Zig Ziglar"},
  {text:"Hard work beats talent when talent doesn't work hard.", by:"Tim Notke"},
  {text:"The expert in anything was once a beginner.", by:"Helen Hayes"},
  {text:"Small daily improvements over time lead to stunning results.", by:"Robin Sharma"},
  {text:"Believe you can and you're halfway there.", by:"Theodore Roosevelt"},
  {text:"Education is not the filling of a pail, but the lighting of a fire.", by:"W.B. Yeats"},
  {text:"The man who moves a mountain begins by carrying away small stones.", by:"Confucius"},
  {text:"An investment in knowledge pays the best interest.", by:"Benjamin Franklin"},
  {text:"The beautiful thing about learning is that no one can take it away from you.", by:"B.B. King"},
  {text:"Discipline is the bridge between goals and accomplishment.", by:"Jim Rohn"},
  {text:"Don't watch the clock; do what it does. Keep going.", by:"Sam Levenson"},
  {text:"Do something today that your future self will thank you for.", by:"Sean Patrick Flanery"},
  {text:"Learning is a treasure that will follow its owner everywhere.", by:"Chinese Proverb"},
  {text:"He who learns but does not think is lost.", by:"Confucius"},
  {text:"Excellence is not a destination but a continuous journey.", by:"Brian Tracy"},
  {text:"Push yourself, because no one else is going to do it for you.", by:"Unknown"},
  {text:"A year from now you may wish you had started today.", by:"Karen Lamb"},
  {text:"The only way to do great work is to love what you do.", by:"Steve Jobs"},
  {text:"You don't need to be perfect. You just need to be consistent.", by:"Unknown"},
  {text:"Language is the road map of a culture.", by:"Rita Mae Brown"},
  {text:"Strive for progress, not perfection.", by:"Unknown"},
  {text:"Education is the most powerful weapon which you can use to change the world.", by:"Nelson Mandela"},
  {text:"The more that you read, the more things you will know.", by:"Dr. Seuss"},
  {text:"He who learns but does not think is lost.", by:"Confucius"},
  {text:"The capacity to learn is a gift; the ability to learn is a skill.", by:"Brian Herbert"},
  {text:"Invest in yourself. Your career is the engine of your wealth.", by:"Paul Clitheroe"},
  {text:"You are never too old to set another goal or to dream a new dream.", by:"C.S. Lewis"},
];

const SCHEDULE = {
  "2026-05-20":{day:1,tasks:[{text:"使役動詞快速複習（let/make/get/want）",time:"15 min"},{text:"條件句：現實 vs 非現實",time:"15 min"},{text:"Priority 21 單字卡 第1輪",time:"20 min"},{text:"字尾辨認練習",time:"10 min"}]},
  "2026-05-21":{day:2,tasks:[{text:"連接詞邏輯方向判斷（nevertheless/accordingly/while）",time:"15 min"},{text:"詞性變化：位置判斷法",time:"15 min"},{text:"Vocab Day 1：商業動詞",time:"20 min"},{text:"TOEIC Part 1 題型熟悉（照片描述）",time:"10 min"}]},
  "2026-05-22":{day:3,tasks:[{text:"關係子句：who/which/whose/whom",time:"15 min"},{text:"不定詞 vs 動名詞複習",time:"15 min"},{text:"Vocab Day 2：財務用語",time:"20 min"},{text:"Priority 21 第2輪",time:"10 min"}]},
  "2026-05-23":{day:4,tasks:[{text:"全科文法綜合練習（26題）",time:"30 min"},{text:"Vocab Day 3：人資招募",time:"20 min"},{text:"TOEIC Part 2 題型：問答練習",time:"10 min"}]},
  "2026-05-24":{day:5,tasks:[{text:"主詞動詞一致性（新考點）",time:"30 min"},{text:"Vocab Day 4：會議溝通",time:"20 min"},{text:"錯誤單字複習",time:"10 min"}]},
  "2026-05-25":{day:6,tasks:[{text:"Part 5 限時模擬（20題，15分鐘內）",time:"20 min"},{text:"對答案＋分析錯誤",time:"10 min"},{text:"Vocab Day 5：業務行銷",time:"20 min"},{text:"TOEIC Part 3 短對話練習",time:"10 min"}]},
  "2026-05-26":{day:7,tasks:[{text:"Part 6 語境題型練習",time:"20 min"},{text:"分詞形容詞＋despite複習",time:"10 min"},{text:"Vocab Day 6：物流運輸",time:"20 min"},{text:"TOEIC Part 4 短獨白練習",time:"10 min"}]},
  "2026-05-27":{day:8,tasks:[{text:"Part 7 閱讀技巧：先看題目再讀文章",time:"20 min"},{text:"單篇閱讀練習",time:"10 min"},{text:"Vocab Day 7：辦公場所",time:"20 min"},{text:"Priority 21 第3輪",time:"10 min"}]},
  "2026-05-28":{day:9,tasks:[{text:"全科模擬考：Part 5+6（計時30分鐘）",time:"30 min"},{text:"對答案＋記錄錯題",time:"20 min"},{text:"聽力綜合複習",time:"10 min"}]},
  "2026-05-29":{day:10,tasks:[{text:"弱點考點針對複習（根據模擬考錯題）",time:"30 min"},{text:"Priority 21 最終確認",time:"20 min"},{text:"聽力最後練習",time:"10 min"}]},
  "2026-05-30":{day:11,tasks:[{text:"輕度複習：翻看語法規則表",time:"20 min"},{text:"瀏覽單字卡（不背新單字）",time:"10 min"},{text:"放鬆，保持好狀態迎接明天",time:""}]},
  "2026-05-31":{day:"exam",tasks:[{text:"今天是考試日",time:""}]},
};

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function ydayStr(){const d=new Date();d.setDate(d.getDate()-1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function daysLeft(){const now=new Date();now.setHours(0,0,0,0);const ex=new Date(EXAM_DATE);ex.setHours(0,0,0,0);return Math.max(0,Math.round((ex-now)/86400000));}
function todayDisplay(){const d=new Date();return `${pad(d.getMonth()+1)}/${pad(d.getDate())}`;}
function getDayNum(str){const s=SCHEDULE[str];return(s&&s.day!=="exam")?s.day:null;}
function getQuote(){const d=new Date();const idx=(d.getFullYear()*366+d.getMonth()*31+d.getDate())%QUOTES.length;return QUOTES[idx];}

function load(key){try{return JSON.parse(localStorage.getItem(key)||'{}');}catch{return{};}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
function loadNote(k){try{return localStorage.getItem('note_'+k)||'';}catch{return '';}}
function saveNote(k,v){try{localStorage.setItem('note_'+k,v);}catch{}}

function getCarryover(){
  const ys=ydayStr();
  const ys2=SCHEDULE[ys];
  if(!ys2||ys2.day==="exam")return[];
  const yChecks=load('checks_'+ys);
  return ys2.tasks.filter((_,i)=>!yChecks['t_'+i]);
}

let checks={};
const ts=todayStr();

function render(){
  checks=load('checks_'+ts);
  const sched=SCHEDULE[ts];
  const days=daysLeft();
  const dayNum=getDayNum(ts);
  const pct=dayNum?Math.round((dayNum/TOTAL_DAYS)*100):100;
  const quote=getQuote();
  const carryover=getCarryover();
  const note=loadNote(ts);

  let allTasks=sched&&sched.day!=="exam"?sched.tasks:[];
  const totalT=allTasks.length+carryover.length;
  const doneT=allTasks.filter((_,i)=>checks['t_'+i]).length
             +carryover.filter((_,i)=>checks['c_'+i]).length;

  let html=`
  <div class="header">
    <div class="brand">TOEIC Study Bot</div>
    <div class="date-line">${todayDisplay()} ｜距考試 ${days} 天</div>
    <div class="target-line">🎯 目標：<span>800 分起</span></div>
    ${dayNum?`<div class="progress-container">
      <div class="progress-label"><span>進度 Day ${dayNum} / ${TOTAL_DAYS}</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`:''}
  </div>

  <div class="quote-block">
    <div class="quote-text">"${quote.text}"</div>
    <div class="quote-author">— ${quote.by}</div>
  </div>`;

  if(!sched){
    html+=`<div class="no-schedule"><p>今天沒有排程任務。<br>好好休息，明天繼續。</p></div>`;
  } else if(sched.day==="exam"){
    html+=`<div class="all-done"><div class="all-done-title">今天是考試日</div><div class="all-done-sub">相信自己，發揮實力。</div></div>`;
  } else {
    html+=`<div class="tasks-header"><span>任務</span><span class="tasks-done">${doneT} / ${totalT} 完成</span></div>`;

    allTasks.forEach((t,i)=>{
      const done=!!checks['t_'+i];
      html+=`<div class="task-item${done?' done':''}" data-key="t_${i}">
        <div class="checkbox${done?' checked'}"><div class="check-mark"></div></div>
        <div class="task-content">
          <div class="task-text">${t.text}</div>
          ${t.time?`<div class="task-time">${t.time}</div>`:''}
        </div>
      </div>`;
    });

    if(carryover.length>0){
      html+=`<div class="carryover-header">昨日未完成</div>`;
      carryover.forEach((t,i)=>{
        const done=!!checks['c_'+i];
        html+=`<div class="task-item${done?' done':''}" data-key="c_${i}">
          <div class="checkbox${done?' checked'}"><div class="check-mark"></div></div>
          <div class="task-content">
            <div class="task-text">${t.text}</div>
            ${t.time?`<div class="task-time">${t.time}</div>`:''}
          </div>
        </div>`;
      });
    }

    if(doneT===totalT&&totalT>0){
      html+=`<div class="all-done" style="padding:28px 0 0;text-align:left;"><div class="all-done-title" style="font-size:14px;">今日任務完成</div><div class="all-done-sub">明天繼續。</div></div>`;
    }
  }

  html+=`<div class="notes-section">
    <div class="notes-label">今日筆記</div>
    <textarea class="notes-area" id="noteArea" placeholder="記錄重點...">${note}</textarea>
  </div>`;

  document.getElementById('root').innerHTML=html;

  document.querySelectorAll('.task-item').forEach(el=>{
    el.onclick=()=>{
      const key=el.dataset.key;
      checks[key]=!checks[key];
      save('checks_'+ts,checks);
      render();
    };
  });

  const na=document.getElementById('noteArea');
  if(na)na.oninput=()=>saveNote(ts,na.value);
}

render();
</script>
</body>
</html>
